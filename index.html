<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Assignment - Dhofir Edu System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; } /* slate-950 */
        .glass-container { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(245, 158, 11, 0.2); }
        .amber-glow { box-shadow: 0 0 20px rgba(245, 158, 11, 0.3); }
        .input-dark { background-color: #0f172a; border-color: #1e293b; color: #f8fafc; }
        .input-dark:focus { border-color: #f59e0b; box-shadow: 0 0 0 1px #f59e0b; }
    </style>
</head>
<body class="text-slate-200 antialiased min-h-screen flex flex-col selection:bg-amber-500 selection:text-slate-900 pb-12">

    <!-- HEADER SECTION -->
    <header class="text-center pt-10 pb-20 px-4">
        <h1 class="text-amber-500 font-black text-2xl tracking-tight mb-2">DHOFIR EDU SYSTEM</h1>
        <p class="text-slate-400 text-xs tracking-widest uppercase mb-10">STUDENT ASSIGNMENT PORTAL</p>

        <!-- DIGITAL CLOCK -->
        <div class="glass-container mx-auto inline-block rounded-3xl py-6 px-12 amber-glow">
            <div id="timeDisplay" class="text-5xl md:text-7xl font-black text-white tracking-widest font-mono mb-2">
                00<span class="text-slate-600 animate-pulse">:</span>00<span class="text-slate-600 animate-pulse">:</span>00
            </div>
            <div id="dateDisplay" class="text-amber-500 text-xs md:text-sm font-bold tracking-[0.2em] uppercase">SENIN, 1 JANUARI 2026</div>
        </div>
    </header>

    <!-- FORM SECTION -->
    <main class="flex-grow flex justify-center px-4 -mt-10">
        <div class="bg-slate-900 w-full max-w-xl rounded-3xl shadow-2xl border border-slate-800 overflow-hidden relative z-10">
            
            <div class="bg-slate-950 p-5 border-b border-slate-800 flex items-center gap-3">
                <div class="bg-amber-500/20 p-2 rounded-lg text-amber-500">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                </div>
                <h2 class="text-white font-bold text-lg">Upload Tugas</h2>
            </div>

            <!-- FORM CONTENT -->
            <form id="uploadForm" class="p-6 md:p-8 space-y-6">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-2 ml-1">Nama Lengkap</label>
                        <input type="text" id="nama" required placeholder="Nama sesuai absen..." class="w-full input-dark rounded-xl px-4 py-3 text-sm outline-none transition-all">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-2 ml-1">NIS / No. Absen</label>
                        <input type="number" id="absen" required placeholder="00" class="w-full input-dark rounded-xl px-4 py-3 text-sm outline-none transition-all">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-2 ml-1">Kelas</label>
                    <select id="kelas" required class="w-full input-dark rounded-xl px-4 py-3 text-sm outline-none transition-all font-bold text-amber-500">
                        <option value="" disabled selected>— Pilih Kelas —</option>
                        <option value="7A">Kelas 7A</option>
                        <option value="7B">Kelas 7B</option>
                        <option value="7C">Kelas 7C</option>
                        <option value="8A">Kelas 8A</option>
                        <option value="8B">Kelas 8B</option>
                    </select>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-2 ml-1">Nama Tugas / Materi</label>
                    <input type="text" id="taskName" required placeholder="Contoh: PR Grammar Hal. 20" class="w-full input-dark rounded-xl px-4 py-3 text-sm outline-none transition-all text-emerald-400 font-bold">
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-2 ml-1">Pilih File (Foto/PDF)</label>
                    <div id="dropZone" class="border-2 border-dashed border-slate-700 rounded-2xl p-8 text-center bg-slate-950/50 hover:bg-slate-800 hover:border-amber-500 transition-colors cursor-pointer relative group">
                        <input type="file" id="fileInput" required class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" accept=".pdf,.jpg,.jpeg,.png">
                        <div class="w-12 h-12 bg-slate-800 text-slate-400 group-hover:text-amber-500 group-hover:bg-amber-500/20 rounded-full flex items-center justify-center mx-auto mb-3 transition-colors">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
                        </div>
                        <p class="text-sm font-bold text-slate-300 mb-1"><span class="text-amber-500">Klik untuk pilih file</span></p>
                        <p class="text-xs text-slate-500">Max. 5MB (Biar gak ngelag)</p>
                        
                        <!-- File Preview Name -->
                        <div id="filePreview" class="hidden mt-4 p-3 bg-emerald-500/10 border border-emerald-500/30 rounded-xl">
                            <p id="fileNameDisplay" class="text-xs font-bold text-emerald-400 truncate"></p>
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-2 ml-1">Catatan Tambahan (Opsional)</label>
                    <textarea id="catatan" rows="2" placeholder="Pesan untuk guru..." class="w-full input-dark rounded-xl px-4 py-3 text-sm outline-none transition-all resize-none"></textarea>
                </div>

                <!-- Notifikasi Status -->
                <div id="statusAlert" class="hidden p-4 rounded-xl text-sm font-bold text-center border"></div>

                <button type="submit" id="submitBtn" class="w-full bg-amber-500 hover:bg-amber-400 text-slate-900 font-black py-4 rounded-2xl shadow-[0_4px_14px_rgba(245,158,11,0.3)] transition-transform active:scale-[0.98] flex justify-center items-center gap-2">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                    KIRIM TUGAS SEKARANG
                </button>
            </form>
        </div>
    </main>

    <script>
        // ====================================================================
        // ⚠️ WAAJIB GANTI URL DI BAWAH INI DENGAN URL DEPLOY GOOGLE SCRIPT BAPAK
        // ====================================================================
        const GOOGLE_SCRIPT_URL = "ISI_DENGAN_URL_DEPLOY_BARU_DI_SINI";

        // Logic Jam Digital
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            document.getElementById('timeDisplay').innerHTML = `${hours}<span class="text-slate-600 animate-pulse">:</span>${minutes}<span class="text-slate-600 animate-pulse">:</span>${seconds}`;
            
            const days = ['MINGGU', 'SENIN', 'SELASA', 'RABU', 'KAMIS', 'JUMAT', 'SABTU'];
            const months = ['JAN', 'FEB', 'MAR', 'APR', 'MEI', 'JUN', 'JUL', 'AGU', 'SEP', 'OKT', 'NOV', 'DES'];
            document.getElementById('dateDisplay').textContent = `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Tampilkan nama file saat dipilih & Batasi 5MB
        const fileInput = document.getElementById('fileInput');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const filePreview = document.getElementById('filePreview');
        const statusAlert = document.getElementById('statusAlert');
        let selectedFile = null;

        function showAlert(msg, isError) {
            statusAlert.textContent = msg;
            statusAlert.className = `p-4 rounded-xl text-sm font-bold text-center border block mb-4 ${isError ? 'bg-rose-500/20 border-rose-500/50 text-rose-400' : 'bg-emerald-500/20 border-emerald-500/50 text-emerald-400'}`;
        }

        fileInput.addEventListener('change', function(e) {
            selectedFile = e.target.files[0];
            if (selectedFile) {
                if (selectedFile.size > 5 * 1024 * 1024) {
                    showAlert("❌ Ukuran file terlalu besar! Maksimal 5MB.", true);
                    fileInput.value = "";
                    filePreview.classList.add('hidden');
                    return;
                }
                fileNameDisplay.textContent = `📄 ${selectedFile.name}`;
                filePreview.classList.remove('hidden');
                statusAlert.classList.add('hidden');
            }
        });

        // Submit Form ke Google Apps Script (Format Teks Biasa agar terhindar dari CORS Block)
        document.getElementById('uploadForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            if (!selectedFile) {
                showAlert("❌ Silakan pilih file foto/PDF terlebih dahulu!", true);
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.innerHTML = `<div class="w-5 h-5 border-2 border-slate-900 border-t-transparent rounded-full animate-spin"></div> MENGUPLOAD...`;
            btn.disabled = true;

            const reader = new FileReader();
            reader.onload = function(ev) {
                const base64String = ev.target.result;
                
                const payload = {
                    nama: document.getElementById('nama').value,
                    absen: document.getElementById('absen').value,
                    kelas: document.getElementById('kelas').value,
                    taskName: document.getElementById('taskName').value,
                    catatan: document.getElementById('catatan').value,
                    fileName: selectedFile.name,
                    mimeType: selectedFile.type,
                    base64Data: base64String
                };

                fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // Wajib text/plain
                    body: JSON.stringify(payload)
                })
                .then(response => response.json())
                .then(data => {
                    if(data.status === 'success') {
                        showAlert("✅ Tugas berhasil dikumpulkan! Semangat belajarnya ya!", false);
                        document.getElementById('uploadForm').reset();
                        filePreview.classList.add('hidden');
                        selectedFile = null;
                    } else {
                        showAlert("❌ Gagal mengirim: " + data.message, true);
                    }
                })
                .catch(err => {
                    showAlert("❌ Terjadi kesalahan jaringan. Coba lagi.", true);
                })
                .finally(() => {
                    btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> KIRIM TUGAS SEKARANG`;
                    btn.disabled = false;
                });
            };
            reader.readAsDataURL(selectedFile);
        });
    </script>
</body>
</html>
