<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Pengumpulan Tugas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; }
        .clock-container { background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(255,255,255,0.1); }
        .tab-active { border-bottom: 2px solid #3b82f6; color: #3b82f6; font-weight: 600; }
        .tab-inactive { color: #94a3b8; }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">

    <!-- HEADER SECTION -->
    <header class="text-center pt-12 pb-24 px-4">
        <p class="text-slate-300 text-sm md:text-base mb-4">Sistem pengumpulan tugas digital mandiri. Pastikan seluruh data<br>yang diisi sudah benar sebelum mengirim.</p>
        <p class="text-slate-500 text-xs font-bold tracking-[0.2em] uppercase mb-8">
            BY DHOFIR HABIBI MUTTAQIN • ENGLISH CLASS • SMPN 7 BANJARMASIN
        </p>

        <!-- DIGITAL CLOCK -->
        <div class="clock-container mx-auto inline-block rounded-3xl py-6 px-12 shadow-2xl backdrop-blur-sm">
            <div id="timeDisplay" class="text-5xl md:text-7xl font-bold text-white tracking-wider font-serif mb-2">00<span class="text-slate-500 opacity-50 text-4xl md:text-5xl animate-pulse">:</span>00<span class="text-slate-500 opacity-50 text-4xl md:text-5xl animate-pulse">:</span>00</div>
            <div id="dateDisplay" class="text-slate-400 text-xs md:text-sm font-bold tracking-[0.15em] uppercase">SENIN, 1 JUNI 2026</div>
        </div>
    </header>

    <!-- FORM CARD SECTION -->
    <main class="flex-grow flex justify-center px-4 -mt-16 pb-12">
        <div class="bg-white w-full max-w-2xl rounded-t-3xl shadow-2xl overflow-hidden">
            
            <!-- TABS -->
            <div class="flex border-b border-slate-100">
                <button class="flex-1 py-4 text-sm flex items-center justify-center gap-2 tab-active bg-blue-50/30">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    Upload File
                </button>
                <button class="flex-1 py-4 text-sm flex items-center justify-center gap-2 tab-inactive hover:bg-slate-50 transition-colors">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                    Foto &rarr; PDF
                </button>
                <button class="flex-1 py-4 text-sm flex items-center justify-center gap-2 tab-inactive hover:bg-slate-50 transition-colors">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                    Kirim Link
                </button>
            </div>

            <!-- FORM CONTENT -->
            <form id="uploadForm" class="p-6 md:p-10">
                
                <!-- Identitas -->
                <div class="flex items-center gap-4 mb-6">
                    <span class="text-[10px] font-bold text-slate-400 tracking-wider">IDENTITAS SISWA</span>
                    <div class="flex-grow h-px bg-slate-100"></div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                    <div class="md:col-span-2">
                        <label class="block text-sm font-semibold text-slate-700 mb-2">Nama Lengkap <span class="text-rose-500">*</span></label>
                        <input type="text" id="nama" required placeholder="Nama sesuai absen" class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 bg-slate-50">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">No. Absen <span class="text-rose-500">*</span></label>
                        <input type="number" id="absen" required placeholder="00" class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 bg-slate-50">
                    </div>
                </div>

                <div class="mb-10">
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Kelas <span class="text-rose-500">*</span></label>
                    <select id="kelas" required class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 bg-slate-50 appearance-none">
                        <option value="" disabled selected>Pilih Kelas</option>
                        <option value="7A">7A</option>
                        <option value="7B">7B</option>
                        <option value="7C">7C</option>
                    </select>
                </div>

                <!-- Detail Tugas -->
                <div class="flex items-center gap-4 mb-6">
                    <span class="text-[10px] font-bold text-slate-400 tracking-wider">DETAIL TUGAS</span>
                    <div class="flex-grow h-px bg-slate-100"></div>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Judul Tugas <span class="text-rose-500">*</span></label>
                    <input type="text" id="taskName" required placeholder="Contoh: Tugas Mandiri Bab 3" class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 bg-slate-50">
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-semibold text-slate-700 mb-2">File Tugas <span class="text-rose-500">*</span></label>
                    <div id="dropZone" class="border-2 border-dashed border-slate-200 rounded-2xl p-8 text-center bg-slate-50/50 hover:bg-blue-50/30 hover:border-blue-300 transition-colors cursor-pointer relative">
                        <input type="file" id="fileInput" required class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" accept=".pdf,.doc,.docx,.jpg,.jpeg,.png">
                        <div class="w-12 h-12 bg-blue-100 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-3">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                        </div>
                        <p class="text-sm font-semibold text-slate-700 mb-1"><span class="text-blue-600">Klik pilih file</span> atau seret ke sini</p>
                        <p class="text-xs text-slate-400">PDF, Word, Gambar • Maks. 10MB</p>
                        <p id="fileNameDisplay" class="text-sm text-emerald-600 font-bold mt-3 hidden"></p>
                    </div>
                </div>

                <div class="mb-8">
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Catatan</label>
                    <textarea id="catatan" rows="3" placeholder="Keterangan tambahan jika ada..." class="w-full border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 bg-slate-50 resize-none"></textarea>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-[#0f172a] hover:bg-slate-800 text-white font-bold py-4 rounded-xl transition-transform active:scale-[0.98] flex justify-center items-center gap-2">
                    KIRIM TUGAS
                </button>
            </form>
        </div>
    </main>

    <script>
        // --- ⚠️ GANTI DENGAN URL WEB APP GOOGLE APPS SCRIPT BAPAK ⚠️ ---
        const GOOGLE_SCRIPT_URL = "ISI_DENGAN_URL_DEPLOY_BARU_DI_SINI";

        // Logic Jam Digital
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            document.getElementById('timeDisplay').innerHTML = `${hours}<span class="text-slate-500 opacity-50 text-4xl md:text-5xl animate-pulse">:</span>${minutes}<span class="text-slate-500 opacity-50 text-4xl md:text-5xl animate-pulse">:</span>${seconds}`;
            
            const days = ['MINGGU', 'SENIN', 'SELASA', 'RABU', 'KAMIS', 'JUMAT', 'SABTU'];
            const months = ['JANUARI', 'FEBRUARI', 'MARET', 'APRIL', 'MEI', 'JUNI', 'JULI', 'AGUSTUS', 'SEPTEMBER', 'OKTOBER', 'NOVEMBER', 'DESEMBER'];
            document.getElementById('dateDisplay').textContent = `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Tampilkan nama file saat dipilih
        const fileInput = document.getElementById('fileInput');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        let selectedFile = null;

        fileInput.addEventListener('change', function(e) {
            selectedFile = e.target.files[0];
            if (selectedFile) {
                if (selectedFile.size > 10 * 1024 * 1024) {
                    alert("Ukuran file terlalu besar! Maksimal 10MB.");
                    fileInput.value = "";
                    fileNameDisplay.classList.add('hidden');
                    return;
                }
                fileNameDisplay.textContent = `File siap: ${selectedFile.name}`;
                fileNameDisplay.classList.remove('hidden');
            }
        });

        // Submit Form ke Google Apps Script
        document.getElementById('uploadForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            if (!selectedFile) {
                alert("Silakan pilih file tugas terlebih dahulu!");
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.innerHTML = `<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> MENGIRIM...`;
            btn.disabled = true;

            const reader = new FileReader();
            reader.onload = function(ev) {
                const base64String = ev.target.result.split(',')[1];
                
                const payload = {
                    nama: document.getElementById('nama').value,
                    absen: document.getElementById('absen').value,
                    kelas: document.getElementById('kelas').value,
                    taskName: document.getElementById('taskName').value,
                    catatan: document.getElementById('catatan').value,
                    fileName: selectedFile.name,
                    mimeType: selectedFile.type,
                    base64Data: base64String
                };

                fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                })
                .then(response => response.json())
                .then(data => {
                    if(data.status === 'success') {
                        alert("Tugas berhasil dikirim!");
                        document.getElementById('uploadForm').reset();
                        fileNameDisplay.classList.add('hidden');
                        selectedFile = null;
                    } else {
                        alert("Gagal: " + data.message);
                    }
                })
                .catch(err => alert("Terjadi kesalahan jaringan."))
                .finally(() => {
                    btn.innerHTML = "KIRIM TUGAS";
                    btn.disabled = false;
                });
            };
            reader.readAsDataURL(selectedFile);
        });
    </script>
</body>
</html>
